<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gradient</title>
    <style>
      .liner-gradient {
        width: 400px;
        height: 400px;
        background: linear-gradient(to left, pink, red);
      }
      .radial-gradient {
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, pink, red);
      }
    </style>
  </head>
  <body>
    <h2>Gradient Effect</h2>
    <div class="liner-gradient"></div>
    <div class="radial-gradient"></div>
  </body>
</html>
