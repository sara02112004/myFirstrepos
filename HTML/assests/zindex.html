<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box {
        width: 150px;
        height: 150px;
        position: absolute;
        color: aliceblue;
        font-weight: bold;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .box1 {
        background-color: antiquewhite;
        top: 40px;
        left: 40px;
        z-index: 1;
      }
      .box2 {
        background-color: burlywood;
        top: 80px;
        left: 80px;
        z-index: 2;
      }
      .box3 {
        background-color: cadetblue;
        top: 120px;
        left: 120px;
        z-index: 3;
      }
      .box4 {
        background-color: rgb(150, 95, 160);
        top: 160px;
        left: 160px;
        z-index: 4;
      }
    </style>
  </head>
  <body>
    <h2>Z index with negative example</h2>
    <div class="box box1">z=2</div>
    <div class="box box2">z=1</div>
    <div class="box box3">z=2</div>
    <div class="box box4">z=4</div>
  </body>
</html>
