<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* div {
          background-color: cadetblue;
          width: 200px;
          height: 200px;
          text-align: center;

          box-shadow: 4px 5px 20px black;
        } */
      .transition-box {
        width: 100px;
        height: 100px;
        background-color: chocolate;
        animation: movebox 2s infinite;
      }
      @keyframes movebox {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(200px);
        }
      }

      .animation-box {
        width: 100px;
        height: 100px;
        background-color: rgb(210, 30, 30);
        animation: movebox 2s infinite alternate-reverse;
      }
      @keyframes movebox {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(200px);
        }
      }
      .transform {
        width: 100px;
        height: 100px;
        margin: 100px;
        background-color: blueviolet;
        transition: transform 0.5s;
      }
      .transform:hover {
        transform: rotate(20deg) scale(1.9);
      }
    </style>
  </head>
  <body>
    <!-- <div>1</div> -->
    <div class="transition-box">box</div>
    <h4 style="gap: 10px">animi</h4>
    <div class="animation-box"></div>
    <div class="transform"></div>
  </body>
</html>
