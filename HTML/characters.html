<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FROM Cast</title>

    <style>
      #characters {
        display: grid;
        grid-template-columns: repeat(6, 5fr);
        gap: 10px;
      }

      #characters img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 10px;
      }

      .medium {
        grid-row: span 3;
      }

      .large {
        grid-column: span 2;
      }
    </style>
  </head>
  <body>
    <div id="characters">
      <img src="/assests/from-cast.avif" class="large" />
      <img src="/assests/from-cast-victor.avif" class="medium" />
      <img src="/assests/from-cast-tabitha.avif" class="small" />
      <img src="/assests/from-cast-sara-myers.avif" class="large" />
      <img src="/assests/from-cast-kristi-miller.avif" class="medium" />
      <img src="/assests/from-cast-kenny.avif" class="small" />
      <img src="/assests/from-cast-julia-matthews.avif" class="large" />
      <img src="/assests/from-cast-jim-matthews.avif" class="medium" />
      <img src="/assests/from-cast-jade.avif" class="small" />
      <img src="/assests/from-cast-father.avif" class="large" />
      <img src="/assests/from-cast-ellis-stevens.avif" class="medium" />
      <img src="/assests/from-cast-donna.avif" class="small" />
    </div>
  </body>
</html>
