<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>media queries</title>
    <style>
      .container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
      .items {
        background-color: aquamarine;
        border: 2px solid black;
        color: blue;
        width: 100px;
        height: 200px;
        border-radius: 3px;
        align-items: end;
        justify-content: center;
      }

      @media (min-width: 993px) and (max-width: 1600px) {
        .container {
          grid-template-columns: repeat(4, 1fr);
          background-color: rgb(230, 173, 173);
        }
      }
      @media (min-width: 769px) and (max-width: 992px) {
        .container {
          grid-template-columns: repeat(3, 1fr);
          background-color: rgb(31, 28, 131);
        }
      }
      @media (min-width: 601px) and (max-width: 768px) {
        .container {
          grid-template-columns: repeat(2, 1fr);
          background-color: rgb(131, 28, 73);
        }
      }
      @media (max-width: 600px) {
        .container {
          grid-template-columns: repeat(1, 1fr);
          background-color: rgb(28, 131, 95);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="items">item1</div>
      <div class="items">item2</div>
      <div class="items">item3</div>
      <div class="items">item4</div>
      <div class="items">item5</div>
      <div class="items">item6</div>
      <div class="items">item7</div>
      <div class="items">item8</div>
      <div class="items">item9</div>
      <div class="items">item10</div>
    </div>
  </body>
</html>
