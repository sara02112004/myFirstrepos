<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      div {
        width: 200px;
        height: 200px;
        background-color: cadetblue;
        animation: movebox 4s infinite alternate-reverse;
      }
      @keyframes movebox {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(300px);
        }
      }
    </style>
  </head>
  <body>
    <div></div>
  </body>
</html>
